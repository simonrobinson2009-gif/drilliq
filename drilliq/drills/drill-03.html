<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>DrillIQ — 03 Overlap & Cutback</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/style.css">
</head>
<body>
<div id="card"><svg id="mainSVG" width="405" height="720"></svg></div>
<div id="controls">
  <button class="btn-play" id="btnPlay">▶ PLAY</button>
  <button class="btn-reset" id="btnReset">↺ RESET</button>
  <span class="speed-label">SPEED</span>
  <button class="btn-speed" data-speed="0.5">0.5x</button>
  <button class="btn-speed active" data-speed="1">1x</button>
  <button class="btn-speed" data-speed="1.5">1.5x</button>
</div>
<script src="../assets/engine.js"></script>
<script>
runDrill({
  // ── Branding ──
  drillNum:    "03",
  drillCat:    "PASSING",
  title1:      "OVERLAP &",
  title2:      "CUTBACK",
  meta:        ["4 PLAYERS", "20 MIN", "ADVANCED"],
  seriesLabel: "SERIES 3 OF 3",
  phaseDots:   5,
  goalThreshold: 0.90,

  // ── Players ──
  players: [
    { label:"1", color:"#FF6B35" },
    { label:"2", color:"#B4FF50" },
    { label:"3", color:"#7aaff0" },
    { label:"4", color:"#ff80c8" },

  // ── Start position rings ──

    { x:60,  y:140 }, // P1
    { x:185, y:80  }, // P2
    { x:185, y:200 }, // P3
    { x:320, y:72  }, // P4 wide top
  ],

  // ── Cone gate ──
  coneGate: [
    { x:350, y:112 },
    { x:350, y:168 },

  startBall: { x:60, y:140 },

  // ── Phase states ──
  states: {
    phase0: {

      players: [ {x:60,y:140}, {x:185,y:80}, {x:185,y:200}, {x:320,y:72} ],
      ball: {x:60,y:140},
      arrows: [
        { from:0, to:1,                    dashed:false, color:"#B4FF50" },
        { from:2, to:{x:260,y:160},        dashed:true,  color:"#7aaff0" },
      ],
    },
    phase1: {
      label: "P2 lays off to P3",
      players: [ {x:110,y:140}, {x:185,y:80}, {x:235,y:175}, {x:320,y:72} ],
      ball: {x:185,y:80},
      arrows: [
        { from:1, to:2,                    dashed:false, color:"#7aaff0" },
        { from:3, to:{x:358,y:52},         dashed:true,  color:"#ff80c8" },
        { from:0, to:{x:275,y:130},        dashed:true,  color:"#FF6B35" },
      ],
    },
    phase2: {
      label: "P3 switches to P4 wide",
      players: [ {x:185,y:130}, {x:215,y:88}, {x:245,y:178}, {x:345,y:72} ],
      ball: {x:245,y:178},
      arrows: [
        { from:2, to:3,                    dashed:false, color:"#ff80c8" },
        { from:0, to:{x:308,y:140},        dashed:true,  color:"#FF6B35" },
      ],
    },
    phase3: {
      label: "P4 drives to byline",
      players: [ {x:290,y:138}, {x:260,y:95}, {x:268,y:188}, {x:358,y:52} ],
      ball: {x:358,y:52},
      arrows: [
        { from:3, to:{x:308,y:145},        dashed:false, color:"#ff80c8" },
        { from:0, to:{x:308,y:145},        dashed:true,  color:"#FF6B35" },
      ],
    },
    phase4: {
      label: "P1 taps in!",
      players: [ {x:308,y:145}, {x:272,y:98}, {x:275,y:195}, {x:358,y:52} ],
      ball: {x:308,y:145},
      arrows: [
        { from:0, to:{x:375,y:140},        dashed:false, color:"#FF6B35" },
      ],
    },
    phase5: {
      label: "GOAL!",
      players: [ {x:308,y:145}, {x:272,y:98}, {x:275,y:195}, {x:358,y:52} ],
      ball: {x:378,y:140},
      arrows: [],
    },
  },

  // ── Segments ──
  segments: [
    { from:"phase0", to:"phase1", moveDuration:1600, pauseDuration:500 },
    { from:"phase1", to:"phase2", moveDuration:1600, pauseDuration:500 },
    { from:"phase2", to:"phase3", moveDuration:1600, pauseDuration:500 },
    { from:"phase3", to:"phase4", moveDuration:1600, pauseDuration:500 },
    { from:"phase4", to:"phase5", moveDuration:1100, pauseDuration:900 },
  ],
});

</body>
</html>
