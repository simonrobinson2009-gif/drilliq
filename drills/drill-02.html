<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>DrillIQ — 02 Wall Pass & Third Man Run</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/style.css">
</head>
<body>
<div id="card"><svg id="mainSVG" width="405" height="720"></svg></div>
<div id="controls">
  <button class="btn-play" id="btnPlay">▶ PLAY</button>
  <button class="btn-reset" id="btnReset">↺ RESET</button>
  <span class="speed-label">SPEED</span>
  <button class="btn-speed" data-speed="0.5">0.5x</button>
  <button class="btn-speed active" data-speed="1">1x</button>
  <button class="btn-speed" data-speed="1.5">1.5x</button>
</div>
<script src="../assets/engine.js"></script>
<script>
runDrill({
  // ── Branding ──
  drillNum:    "02",
  drillCat:    "PASSING",
  title1:      "WALL PASS &",
  title2:      "THIRD MAN RUN",
  meta:        ["3 PLAYERS", "15 MIN", "PASSING"],
  seriesLabel: "SERIES 2 OF 3",
  phaseDots:   4,
  goalThreshold: 0.85,

  // ── Players ──
  players: [
    { label:"1", color:"#FF6B35" },
    { label:"2", color:"#B4FF50" },
    { label:"3", color:"#7aaff0" },
  ],

  // ── Start position rings ──
  startPositions: [
    { x:70,  y:140 }, // P1
    { x:220, y:70  }, // P2
    { x:220, y:210 }, // P3
  ],

  // ── Cone gate ──
  coneGate: [
    { x:350, y:112 },
    { x:350, y:168 },
  ],

  // ── Ball start ──
  startBall: { x:70, y:140 },

  // ── Phase states ──
  states: {
    phase0: {
      label: "P1 passes to P2",
      players: [ {x:70,y:140}, {x:220,y:70}, {x:220,y:210} ],
      ball: {x:70,y:140},
      arrows: [
        { from:0, to:1,                    dashed:false, color:"#B4FF50" },
        { from:2, to:{x:310,y:140},        dashed:true,  color:"#7aaff0" },
      ],
    },
    phase1: {
      label: "P2 lays off to P3",
      players: [ {x:130,y:140}, {x:220,y:70}, {x:270,y:175} ],
      ball: {x:220,y:70},
      arrows: [
        { from:1, to:2,                    dashed:false, color:"#7aaff0" },
        { from:0, to:{x:300,y:110},        dashed:true,  color:"#FF6B35" },
      ],
    },
    phase2: {
      label: "P3 plays P1 through",
      players: [ {x:220,y:120}, {x:240,y:75}, {x:280,y:175} ],
      ball: {x:280,y:175},
      arrows: [
        { from:2, to:{x:330,y:115},        dashed:false, color:"#B4FF50" },
        { from:0, to:{x:335,y:108},        dashed:true,  color:"#FF6B35" },
      ],
    },
    phase3: {
      label: "P1 receives & shoots!",
      players: [ {x:330,y:110}, {x:295,y:85}, {x:305,y:175} ],
      ball: {x:330,y:110},
      arrows: [
        { from:0, to:{x:375,y:140},        dashed:false, color:"#FF6B35" },
      ],
    },
    phase4: {
      label: "GOAL!",
      players: [ {x:330,y:110}, {x:295,y:85}, {x:305,y:175} ],
      ball: {x:378,y:140},
      arrows: [],
    },
  },

  // ── Segments ──
  segments: [
    { from:"phase0", to:"phase1", moveDuration:1600, pauseDuration:500 },
    { from:"phase1", to:"phase2", moveDuration:1600, pauseDuration:500 },
    { from:"phase2", to:"phase3", moveDuration:1600, pauseDuration:500 },
    { from:"phase3", to:"phase4", moveDuration:1100, pauseDuration:900 },
  ],
});
</script>
</body>
</html>
