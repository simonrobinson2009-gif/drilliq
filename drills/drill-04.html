<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>DrillIQ — 04 Carry, Draw & Release</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/style.css">
</head>
<body>
<div id="card"><svg id="mainSVG" width="405" height="720"></svg></div>
<div id="controls">
  <button class="btn-play" id="btnPlay">&#9654; PLAY</button>
  <button class="btn-reset" id="btnReset">&#8635; RESET</button>
  <span class="speed-label">SPEED</span>
  <button class="btn-speed" data-speed="0.5">0.5x</button>
  <button class="btn-speed active" data-speed="1">1x</button>
  <button class="btn-speed" data-speed="1.5">1.5x</button>
</div>
<script src="../assets/engine.js"></script>
<script>
runDrill({
  drillNum:"04", drillCat:"DRIBBLING", title1:"CARRY, DRAW", title2:"& RELEASE",
  meta:["3 PLAYERS","15 MIN","DRIBBLING"], seriesLabel:"SERIES 1 OF 3",
  phaseDots:3, goalThreshold:0.87,
  players:[{label:"1",color:"#FF6B35"},{label:"2",color:"#B4FF50"},{label:"D",color:"#FF3B5C"}],
  startPositions:[{x:80,y:155},{x:200,y:65},{x:185,y:148}],
  coneGate:[{x:350,y:112},{x:350,y:168}],
  startBall:{x:80,y:155},
  states:{
    phase0:{label:"P1 carries at defender",players:[{x:80,y:155},{x:200,y:65},{x:185,y:148}],ball:{x:80,y:155},
      arrows:[{from:0,to:{x:200,y:152},dashed:true,color:"#FF6B35"},{from:1,to:{x:310,y:65},dashed:true,color:"#B4FF50"}]},
    phase1:{label:"Defender commits — release!",players:[{x:195,y:152},{x:270,y:65},{x:218,y:150}],ball:{x:195,y:152},
      arrows:[{from:0,to:1,dashed:false,color:"#B4FF50"},{from:1,to:{x:320,y:65},dashed:true,color:"#B4FF50"}]},
    phase2:{label:"P2 in space — shoots!",players:[{x:225,y:152},{x:318,y:67},{x:245,y:150}],ball:{x:318,y:67},
      arrows:[{from:1,to:{x:375,y:140},dashed:false,color:"#B4FF50"}]},
    phase3:{label:"GOAL!",players:[{x:225,y:152},{x:318,y:67},{x:245,y:150}],ball:{x:378,y:140},arrows:[]},
  },
  segments:[
    {from:"phase0",to:"phase1",moveDuration:1800,pauseDuration:500},
    {from:"phase1",to:"phase2",moveDuration:1500,pauseDuration:500},
    {from:"phase2",to:"phase3",moveDuration:1000,pauseDuration:900},
  ],
});
</script>
</body>
</html>
