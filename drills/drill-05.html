<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>DrillIQ — 05 Pass Under Pressure</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/style.css">
</head>
<body>
<div id="card"><svg id="mainSVG" width="405" height="720"></svg></div>
<div id="controls">
  <button class="btn-play" id="btnPlay">&#9654; PLAY</button>
  <button class="btn-reset" id="btnReset">&#8635; RESET</button>
  <span class="speed-label">SPEED</span>
  <button class="btn-speed" data-speed="0.5">0.5x</button>
  <button class="btn-speed active" data-speed="1">1x</button>
  <button class="btn-speed" data-speed="1.5">1.5x</button>
</div>
<script src="../assets/engine.js"></script>
<script>
runDrill({
  drillNum:"05", drillCat:"PASSING", title1:"PASS UNDER", title2:"PRESSURE",
  meta:["4 PLAYERS","15 MIN","PASSING"], seriesLabel:"SERIES 2 OF 3",
  phaseDots:3, goalThreshold:0.87,
  players:[{label:"1",color:"#FF6B35"},{label:"2",color:"#B4FF50"},{label:"3",color:"#7aaff0"},{label:"D",color:"#FF3B5C"}],
  startPositions:[{x:70,y:155},{x:185,y:120},{x:185,y:220},{x:240,y:118}],
  coneGate:[{x:350,y:112},{x:350,y:168}],
  startBall:{x:70,y:155},
  states:{
    phase0:{label:"P1 passes — defender presses",players:[{x:70,y:155},{x:185,y:120},{x:185,y:220},{x:240,y:118}],ball:{x:70,y:155},
      arrows:[{from:0,to:1,dashed:false,color:"#B4FF50"},{from:2,to:{x:265,y:195},dashed:true,color:"#7aaff0"},{from:0,to:{x:150,y:148},dashed:true,color:"#FF6B35"}]},
    phase1:{label:"P2 one-touch to P3!",players:[{x:145,y:148},{x:185,y:120},{x:265,y:195},{x:210,y:120}],ball:{x:185,y:120},
      arrows:[{from:1,to:2,dashed:false,color:"#7aaff0"},{from:2,to:{x:315,y:185},dashed:true,color:"#7aaff0"}]},
    phase2:{label:"P3 wide & free — shoots!",players:[{x:200,y:145},{x:205,y:122},{x:315,y:185},{x:232,y:123}],ball:{x:315,y:185},
      arrows:[{from:2,to:{x:375,y:140},dashed:false,color:"#7aaff0"}]},
    phase3:{label:"GOAL!",players:[{x:200,y:145},{x:205,y:122},{x:315,y:185},{x:232,y:123}],ball:{x:378,y:140},arrows:[]},
  },
  segments:[
    {from:"phase0",to:"phase1",moveDuration:1600,pauseDuration:500},
    {from:"phase1",to:"phase2",moveDuration:1600,pauseDuration:500},
    {from:"phase2",to:"phase3",moveDuration:1000,pauseDuration:900},
  ],
});
</script>
</body>
</html>
